# CI GPU Tests via SkyPilot
# Runs GPU tests: JAX CPU ref vs FLA Triton (simple_gla)
#
# Usage (CI - automatic via GitHub Actions):
#   Triggered by .github/workflows/gpu_tests.yml
#
# Usage (manual):
#   sky launch .github/ci/gpu-tests.sky.yaml --env BRANCH=main -y

resources:
  accelerators: H100:1
  cloud: gcp
  use_spot: true

setup: |
  set -ex

  pip install uv

  git clone -b "${BRANCH:-main}" --depth=1 \
    https://github.com/primatrix/pallas-kernel.git ~/pallas-kernel

  cd ~/pallas-kernel
  uv sync --extra gpu

run: |
  set -ex
  cd ~/pallas-kernel
  export TRITON_CACHE_DIR=/models/triton_compile_cache
  uv run python -m pytest \
    -o "addopts=--strict-markers" \
    tests/ref/kda/special/ \
    --ignore=tests/ref/kda/special/test_chunk_bwd_dAv_dhu_pallas.py \
    --ignore=tests/ref/kda/special/test_chunk_bwd_pallas.py \
    -v
  uv run python -m pytest \
    -o "addopts=--strict-markers" \
    tests/ref/simple_gla/ \
    -k triton \
    -v
