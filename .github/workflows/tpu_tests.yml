name: TPU Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tpu-tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  tpu_tests:
    name: "TPU v7 tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}

      - name: Generate unique job name
        id: job
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          JOB_NAME="ci-pk-tests-$(echo "$BRANCH" | tr '/_' '--' | tr '[:upper:]' '[:lower:]' | head -c 30)-${GITHUB_RUN_NUMBER}"
          JOB_NAME=$(echo "$JOB_NAME" | head -c 63)
          echo "name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Sanitize branch name for K8s label
        id: branch
        run: |
          RAW="${{ github.head_ref || github.ref_name }}"
          LABEL=$(echo "$RAW" | sed 's/[^a-zA-Z0-9._-]/-/g' | head -c 63 | sed 's/^[^a-zA-Z0-9]//;s/[^a-zA-Z0-9]$//')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Cleanup previous CI resources
        run: |
          BRANCH_LABEL="${{ steps.branch.outputs.label }}"
          echo "Cleaning up leftover CI resources for branch=$BRANCH_LABEL..."
          kubectl delete jobs -l "app=ci-pallas-kernel-tests,ci-branch=$BRANCH_LABEL" --ignore-not-found
          kubectl delete services -l "app=ci-pallas-kernel-tests,ci-branch=$BRANCH_LABEL" --ignore-not-found
          kubectl delete secrets -l "app=ci-pallas-kernel-tests,ci-branch=$BRANCH_LABEL" --ignore-not-found

      - name: Create GitHub token secret
        run: |
          JOB_NAME="${{ steps.job.outputs.name }}"
          kubectl create secret generic "${JOB_NAME}-token" \
            --from-literal=token="${{ github.token }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl label secret "${JOB_NAME}-token" \
            app=ci-pallas-kernel-tests \
            ci-branch="${{ steps.branch.outputs.label }}" \
            --overwrite

      - name: Deploy K8s Job
        env:
          JOB_NAME: ${{ steps.job.outputs.name }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          BRANCH_LABEL: ${{ steps.branch.outputs.label }}
        run: |
          envsubst '$JOB_NAME $BRANCH $BRANCH_LABEL' \
            < .github/ci/tpu-tests-job.yaml \
            | kubectl apply -f -

      - name: Wait for pod to start
        run: |
          JOB_NAME="${{ steps.job.outputs.name }}"
          echo "Waiting for pod of job/$JOB_NAME to start..."
          for i in $(seq 1 60); do
            POD=$(kubectl get pods -l "job-name=$JOB_NAME" \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              PHASE=$(kubectl get pod "$POD" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              echo "  Pod $POD phase: $PHASE"
              if [ "$PHASE" = "Running" ] || [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; then
                break
              fi
            fi
            echo "  Waiting for pod to be scheduled... ($i/60)"
            sleep 10
          done

      - name: Stream logs & wait for completion
        run: |
          JOB_NAME="${{ steps.job.outputs.name }}"

          # 循环重连日志，直到 Pod 进入终态
          for i in $(seq 1 20); do
            POD=$(kubectl get pods -l "job-name=$JOB_NAME" \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            PHASE=$(kubectl get pod "$POD" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            if [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Failed" ]; then
              echo "Pod finished with phase: $PHASE"
              break
            fi
            echo "Streaming logs (attempt $i)..."
            kubectl logs -f "job/$JOB_NAME" -c jax-tpu 2>/dev/null || true
            sleep 5
          done

          # Wait for the Job controller to update conditions
          echo "Waiting for job completion status..."
          if kubectl wait --for=condition=complete --timeout=1800s "job/$JOB_NAME" 2>/dev/null; then
            echo "TPU tests completed successfully!"
            exit 0
          fi
          if kubectl wait --for=condition=failed --timeout=30s "job/$JOB_NAME" 2>/dev/null; then
            echo "TPU tests failed!"
            exit 1
          fi
          echo "Job in unexpected state:"
          kubectl get "job/$JOB_NAME" -o wide
          exit 1

      - name: Cleanup
        if: always()
        run: |
          JOB_NAME="${{ steps.job.outputs.name }}"
          kubectl delete job "$JOB_NAME" --ignore-not-found
          kubectl delete service "${JOB_NAME}-headless-svc" --ignore-not-found
          kubectl delete secret "${JOB_NAME}-token" --ignore-not-found
